<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hypercore</title>
    <script src="https://unpkg.com/cytoscape@3.31.2/dist/cytoscape.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #202124;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .app {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr) 340px;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100vh;
      }

      .toolbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 54px;
        padding: 10px 16px;
        border-bottom: 1px solid #d9d6cc;
        background: #fffdf8;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .toolbar .spacer {
        flex: 1;
      }

      .zoom {
        display: flex;
        gap: 6px;
      }

      .zoom button {
        min-width: 34px;
        padding: 6px 10px;
        border: 1px solid #b9b5aa;
        border-radius: 6px;
        background: white;
        color: #202124;
        font-size: 14px;
        cursor: pointer;
      }

      .zoom button:hover {
        background: #f0ede4;
      }

      /* ---- left: intent ---- */

      .intent {
        border-right: 1px solid #d9d6cc;
        background: #ffffff;
        overflow: auto;
        padding: 14px;
        min-height: 0;
      }

      .intent h3,
      .panel h3 {
        margin: 18px 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #64675f;
      }

      .intent h3:first-child {
        margin-top: 0;
      }

      .row {
        display: block;
        width: 100%;
        text-align: left;
        border: 0;
        border-top: 1px solid #ece9df;
        background: none;
        font: inherit;
        color: inherit;
        padding: 8px 6px;
        font-size: 13px;
        line-height: 1.4;
        cursor: pointer;
        border-radius: 4px;
      }

      .row:hover {
        background: #f6f4ec;
      }

      .row.selected {
        background: #eef2fb;
      }

      .row .meta {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 2px;
      }

      .row .id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #64675f;
      }

      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 1px 6px;
        border-radius: 9px;
        border: 1px solid transparent;
      }

      .badge.machine {
        color: #7a5410;
        background: #fdf0d4;
        border-color: #e0a23c;
      }

      .badge.open {
        color: #8a3417;
        background: #fbe3d8;
        border-color: #c05a36;
      }

      .badge.folded {
        color: #1f5446;
        background: #ddeee9;
        border-color: #2f7d6d;
      }

      .badge.abandoned {
        color: #5b5e63;
        background: #e9eaec;
        border-color: #9aa0a6;
      }

      .badge.kind {
        color: #3c4043;
        background: #eef0f2;
        border-color: #c5c9ce;
      }

      .row.machine {
        border-left: 3px solid #e0a23c;
        background: #fffaf0;
      }

      .row.machine:hover {
        background: #fdf3dd;
      }

      .endorse {
        float: right;
        margin-left: 8px;
        padding: 2px 9px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid #2f7d6d;
        border-radius: 11px;
        background: #ffffff;
        color: #2f7d6d;
        cursor: pointer;
      }

      .endorse:hover {
        background: #ddeee9;
      }

      .endorse.confirm {
        background: #2f7d6d;
        color: #ffffff;
      }

      details.segment {
        border-top: 1px solid #ece9df;
        padding: 4px 0;
      }

      details.segment summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 6px;
        color: #3c4043;
      }

      details.segment summary .muted {
        font-weight: 400;
      }

      /* ---- center: graph ---- */

      #cy {
        min-height: 0;
        min-width: 0;
      }

      /* ---- right: details ---- */

      .panel {
        border-left: 1px solid #d9d6cc;
        background: #ffffff;
        padding: 16px;
        overflow: auto;
        min-height: 0;
      }

      .panel h2 {
        margin: 0 0 4px;
        font-size: 16px;
        line-height: 1.35;
      }

      .muted {
        color: #64675f;
        font-size: 13px;
      }

      .roles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0;
      }

      .roles .badge {
        font-size: 10px;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        margin: 0;
        padding: 10px;
        border: 1px solid #dadde2;
        border-radius: 6px;
        background: #f5f7fa;
        font-size: 12px;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        padding: 8px 0;
        border-top: 1px solid #ece9df;
        font-size: 13px;
      }

      li.link,
      .panel .row {
        cursor: pointer;
      }

      li.link:hover {
        background: #f6f4ec;
      }

      .section {
        margin-top: 18px;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 320px minmax(0, 1fr);
        }

        .panel {
          grid-column: 1 / -1;
          border-left: 0;
          border-top: 1px solid #d9d6cc;
          max-height: 38vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="toolbar">
        <h1>hypercore</h1>
        <span id="summary" class="muted"></span>
        <span class="spacer"></span>
        <span class="zoom" aria-label="Graph navigation">
          <button id="zoomOut" title="Zoom out">−</button>
          <button id="zoomFit" title="Fit graph">fit</button>
          <button id="zoomIn" title="Zoom in">+</button>
        </span>
      </div>
      <aside class="intent" id="intent" aria-label="Intent and work"></aside>
      <section id="cy" aria-label="Graph"></section>
      <aside class="panel" id="details">
        <h2>Nothing selected</h2>
        <p class="muted">
          Pick a statement or work on the left, or tap a node in the graph.
        </p>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
