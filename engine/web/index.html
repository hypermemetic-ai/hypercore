<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hypercore</title>
    <script>
      // Before first paint, so the operator never sees the wrong theme flash.
      // ?theme=light|dark overrides for this load without being remembered.
      document.documentElement.dataset.theme =
        new URLSearchParams(location.search).get("theme") ||
        localStorage.getItem("hypercore-theme") ||
        "dark";
    </script>
    <script src="https://unpkg.com/cytoscape@3.31.2/dist/cytoscape.min.js"></script>
    <style>
      /* The palette lives in variables; dark is the default, light is the
         operator's opt-in. app.js reads the --graph-* values so the canvas
         follows the same palette. */
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;

        --bg: #15171c;
        --surface: #1b1e24;
        --raised: #21252d;
        --hover: #262b33;
        --selected-row: #24304a;
        --border: #353b46;
        --border-soft: #2a2f38;
        --text: #e7e9ee;
        --muted: #9aa2ac;
        --accent: #8ab4f8;

        --machine-text: #e8b35a;
        --machine-bg: #342a13;
        --machine-border: #a8741f;
        --machine-accent: #e0a23c;
        --machine-row: #241f12;
        --machine-row-hover: #2f2917;

        --open-text: #e8916b;
        --open-bg: #392318;
        --open-border: #8a4a30;
        --open-strong: #d97a55;

        --folded-text: #6fc2ae;
        --folded-bg: #15302a;
        --folded-border: #2f7d6d;

        --gray-text: #aab2bb;
        --gray-bg: #272c33;
        --gray-border: #49515c;

        --endorse: #5fb89f;
        --endorse-hover-bg: #15302a;
        --endorse-confirm: #2f7d6d;

        --pre-bg: #14161a;

        --graph-label: #d8dce2;
        --graph-node-border: #15171c;
        --graph-edge: #5d646e;
        --graph-edge-label: #97a0aa;
        --graph-parent-bg: #1d2127;
        --graph-parent-border: #454d5a;

        background: var(--bg);
        color: var(--text);
      }

      :root[data-theme="light"] {
        color-scheme: light;

        --bg: #f7f7f4;
        --surface: #ffffff;
        --raised: #fffdf8;
        --hover: #f6f4ec;
        --selected-row: #eef2fb;
        --border: #d9d6cc;
        --border-soft: #ece9df;
        --text: #202124;
        --muted: #64675f;
        --accent: #1a73e8;

        --machine-text: #7a5410;
        --machine-bg: #fdf0d4;
        --machine-border: #e0a23c;
        --machine-accent: #e0a23c;
        --machine-row: #fffaf0;
        --machine-row-hover: #fdf3dd;

        --open-text: #8a3417;
        --open-bg: #fbe3d8;
        --open-border: #c05a36;
        --open-strong: #c05a36;

        --folded-text: #1f5446;
        --folded-bg: #ddeee9;
        --folded-border: #2f7d6d;

        --gray-text: #3c4043;
        --gray-bg: #eef0f2;
        --gray-border: #c5c9ce;

        --endorse: #2f7d6d;
        --endorse-hover-bg: #ddeee9;
        --endorse-confirm: #2f7d6d;

        --pre-bg: #f5f7fa;

        --graph-label: #202124;
        --graph-node-border: #ffffff;
        --graph-edge: #8d939a;
        --graph-edge-label: #4f5357;
        --graph-parent-bg: #fffdf8;
        --graph-parent-border: #b9b5aa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .app {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr) 340px;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100vh;
      }

      .toolbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 54px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--raised);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .toolbar .spacer {
        flex: 1;
      }

      /* The live dot: green while the poll is healthy, amber mid-sync,
         gray when the server stops answering. */
      .live {
        font-size: 12px;
        color: var(--muted);
      }

      .live::before {
        content: "●";
        margin-right: 5px;
        color: var(--folded-text);
      }

      .live.syncing::before {
        color: var(--machine-accent);
      }

      .live.stale::before {
        color: var(--gray-border);
      }

      .zoom {
        display: flex;
        gap: 6px;
      }

      .zoom button {
        min-width: 34px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
      }

      .zoom button:hover {
        background: var(--hover);
      }

      /* ---- left: intent ---- */

      .intent {
        border-right: 1px solid var(--border);
        background: var(--surface);
        overflow: auto;
        padding: 14px;
        min-height: 0;
      }

      .intent h3,
      .panel h3 {
        margin: 18px 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }

      .intent h3:first-child {
        margin-top: 0;
      }

      .row {
        display: block;
        width: 100%;
        text-align: left;
        border: 0;
        border-top: 1px solid var(--border-soft);
        background: none;
        font: inherit;
        color: inherit;
        padding: 8px 6px;
        font-size: 13px;
        line-height: 1.45;
        cursor: pointer;
        border-radius: 4px;
      }

      .row:hover {
        background: var(--hover);
      }

      .row.selected {
        background: var(--selected-row);
      }

      .row .meta {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 2px;
      }

      .row .id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 1px 6px;
        border-radius: 9px;
        border: 1px solid transparent;
      }

      .badge.machine {
        color: var(--machine-text);
        background: var(--machine-bg);
        border-color: var(--machine-border);
      }

      .badge.open {
        color: var(--open-text);
        background: var(--open-bg);
        border-color: var(--open-border);
      }

      .badge.folded {
        color: var(--folded-text);
        background: var(--folded-bg);
        border-color: var(--folded-border);
      }

      .badge.abandoned {
        color: var(--gray-text);
        background: var(--gray-bg);
        border-color: var(--gray-border);
      }

      .badge.kind {
        color: var(--gray-text);
        background: var(--gray-bg);
        border-color: var(--gray-border);
      }

      .row.machine {
        border-left: 3px solid var(--machine-accent);
        background: var(--machine-row);
      }

      .row.machine:hover {
        background: var(--machine-row-hover);
      }

      .endorse {
        float: right;
        margin-left: 8px;
        padding: 2px 9px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid var(--endorse);
        border-radius: 11px;
        background: transparent;
        color: var(--endorse);
        cursor: pointer;
      }

      .endorse:hover {
        background: var(--endorse-hover-bg);
      }

      .endorse.confirm {
        background: var(--endorse-confirm);
        color: #ffffff;
      }

      details.segment {
        border-top: 1px solid var(--border-soft);
        padding: 4px 0;
      }

      details.segment summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 6px;
        border-radius: 4px;
        color: var(--text);
      }

      details.segment summary:hover {
        background: var(--hover);
      }

      details.segment summary .muted {
        font-weight: 400;
      }

      /* ---- center: graph ---- */

      #cy {
        min-height: 0;
        min-width: 0;
      }

      /* ---- right: details ---- */

      .panel {
        border-left: 1px solid var(--border);
        background: var(--surface);
        padding: 16px;
        overflow: auto;
        min-height: 0;
      }

      .panel h2 {
        margin: 0 0 4px;
        font-size: 16px;
        line-height: 1.4;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .roles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0;
      }

      .roles .badge {
        font-size: 10px;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        margin: 0;
        padding: 10px;
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        background: var(--pre-bg);
        font-size: 12px;
        line-height: 1.5;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        padding: 8px 0;
        border-top: 1px solid var(--border-soft);
        font-size: 13px;
        line-height: 1.45;
      }

      li.link,
      .panel .row {
        cursor: pointer;
      }

      li.link:hover {
        background: var(--hover);
      }

      .section {
        margin-top: 18px;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 320px minmax(0, 1fr);
        }

        .panel {
          grid-column: 1 / -1;
          border-left: 0;
          border-top: 1px solid var(--border);
          max-height: 38vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="toolbar">
        <h1>hypercore</h1>
        <span id="summary" class="muted"></span>
        <span id="live" class="live" title="The view re-derives itself when the graph changes"
          >live</span
        >
        <span class="spacer"></span>
        <span class="zoom" aria-label="View controls">
          <button id="themeToggle" title="Switch theme">☀</button>
          <button id="zoomOut" title="Zoom out">−</button>
          <button id="zoomFit" title="Fit graph">fit</button>
          <button id="zoomIn" title="Zoom in">+</button>
        </span>
      </div>
      <aside class="intent" id="intent" aria-label="Intent and work"></aside>
      <section id="cy" aria-label="Graph"></section>
      <aside class="panel" id="details">
        <h2>Nothing selected</h2>
        <p class="muted">
          Pick a statement or work on the left, or tap a node in the graph.
        </p>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
